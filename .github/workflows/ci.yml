name: CI

on:
  push:
    branches: [main, full-update, "release/**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-linux:
    name: Python (Linux)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compileall
        run: python -m compileall . -q
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Registry contract
        run: python -c "from tools.registry import validate_tool_registry; errors=validate_tool_registry(); assert not errors, errors"
      - name: Doctor (non-destructive)
        run: python main.py --doctor --json || true
      - name: Whitespace / conflict markers
        run: git diff --check || true

  python-windows:
    name: Python (Windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # dbus-python is Linux-only via environment markers
          python -m pip install -r requirements.txt
      - name: Compileall
        run: python -m compileall . -q
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Registry contract
        run: python -c "from tools.registry import validate_tool_registry; errors=validate_tool_registry(); assert not errors, errors"
      - name: Doctor (non-destructive)
        run: python main.py --doctor --json
        continue-on-error: true

  frontend-electron:
    name: Frontend / Electron syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Electron deps
        run: bun install --frozen-lockfile || bun install
      - name: Bundle web UI
        run: bun build agent/static/app.js --outfile=/tmp/selene-app-check.js
      - name: Electron syntax
        run: |
          export ELECTRON_RUN_AS_NODE=1
          ./node_modules/electron/dist/electron -e "require('fs').readFileSync('electron/main.js'); require('fs').readFileSync('electron/preload.js'); console.log('ok')"
      - name: Packaging helper smoke
        run: python electron/build_desktop.py --help

  packaging-smoke:
    name: PyInstaller analysis smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packaging deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
      - name: Spec syntax / analysis dry-run
        run: |
          python -c "import pathlib; text=pathlib.Path('selene-backend.spec').read_text(); assert 'console=True' in text; assert 'Modelfile' in text; assert 'agent/static' in text; print('spec ok')"
          python -c "import json; pkg=json.load(open('package.json')); assert pkg['version']; assert '\${version}' in pkg['build']['linux']['artifactName'] or pkg['build']['linux']['artifactName']; print('package ok', pkg['version'])"
