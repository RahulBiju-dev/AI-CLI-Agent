<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Selene — A fully local, tool-augmented AI agent interface with dimensional material design">
  <title>Selene — AI Agent</title>

  <!-- ═══════════════════════════════════════════════════════════════
       FONTS: DM Sans (body) + JetBrains Mono (code)
       ═══════════════════════════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- ═══════════════════════════════════════════════════════════════
       LIBRARIES: Markdown, Syntax Highlighting, HTML Sanitization
       ═══════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <!-- ═══════════════════════════════════════════════════════════════
       APPLICATION STYLES
       ═══════════════════════════════════════════════════════════════ -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════════
       HEADER — Fixed top bar
       Logo Mark + Wordmark  |  Token Counter  |  Settings Gear
       Class: .header  (matches style.css §5)
       ═══════════════════════════════════════════════════════════════ -->
  <header class="header" role="banner">

    <!-- Logo Area -->
    <div class="logo-area">
      <div class="logo-mark" aria-hidden="true"></div>
      <h1 class="wordmark">Selene</h1>
    </div>

    <!-- Token Usage Counter (matches CSS §5.1 + JS §5) -->
    <div class="token-counter" role="status" aria-label="Token usage">
      <svg class="token-ring" viewBox="0 0 24 24" width="36" height="36" aria-hidden="true">
        <!-- Background track ring -->
        <circle class="ring-bg" cx="12" cy="12" r="10" fill="none"
                stroke="var(--border-subtle)" stroke-width="3" />
        <!-- Progress arc (JS updates stroke-dashoffset) -->
        <circle class="ring-progress" cx="12" cy="12" r="10" fill="none"
                stroke="var(--accent-gold)" stroke-width="3"
                stroke-linecap="round"
                stroke-dasharray="62.83"
                stroke-dashoffset="62.83" />
      </svg>
      <span class="token-text">0 / 8,192</span>
    </div>

    <!-- Settings Gear Button (JS: dom.settingsToggle = #settings-toggle) -->
    <button id="settings-toggle" class="icon-btn" aria-label="Open settings">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06
                 a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09
                 A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83
                 l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09
                 A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83
                 l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09
                 a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83
                 l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 010 4h-.09
                 a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ═══════════════════════════════════════════════════════════════
       MAIN CONTENT — Sidebar + Chat Viewport
       CSS: .main-body (flex container)
       ═══════════════════════════════════════════════════════════════ -->
  <div class="main-body">

    <!-- ─────────────────────────────────────────────────────────────
         LEFT SIDEBAR — Collapsible navigation
         JS: dom.sidebar = #sidebar  |  CSS: .sidebar / .collapsed
         ───────────────────────────────────────────────────────────── -->
    <aside id="sidebar" class="sidebar" role="navigation" aria-label="Conversation history" aria-expanded="true">

      <!-- Rail Toggle (collapse/expand) — CSS: .rail-toggle  |  JS: #rail-toggle -->
      <button id="rail-toggle" class="rail-toggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <!-- Sidebar Content Wrapper — CSS: .sidebar-content -->
      <div class="sidebar-content">

        <!-- New Chat Button — CSS: .new-chat-btn -->
        <button class="new-chat-btn" aria-label="Start new conversation">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>New Chat</span>
        </button>

        <!-- Search Input — CSS: .search-wrapper / .search-input  |  JS: dom.sidebarSearch -->
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" placeholder="Search conversations…" aria-label="Search conversations">
        </div>

        <!-- Session List — CSS: .session-list  |  JS: dom.conversationList = #session-list -->
        <div id="session-list" class="session-list" role="list" aria-label="Past conversations">
          <!-- Dynamically populated by app.js §6 -->
        </div>

      </div>
    </aside>

    <!-- ─────────────────────────────────────────────────────────────
         CHAT VIEWPORT — Messages + Starfield + Input
         CSS: .chat-viewport  |  JS: dom.chatViewport
         ───────────────────────────────────────────────────────────── -->
    <main class="chat-viewport" role="main" aria-label="Chat viewport">

      <!-- Starfield Canvas — CSS: #starfield  |  JS: dom.starfieldCanvas = #starfield -->
      <canvas id="starfield" aria-hidden="true"></canvas>

      <!-- Messages Scroll Container — CSS: .messages-container  |  JS: dom.messagesContainer = #messages-container -->
      <div id="messages-container" class="messages-container" aria-live="polite">
        <div class="message-group">
          <!-- Welcome message shown on empty state -->
          <div class="message assistant-msg welcome-msg">
            <div class="msg-content">
              <p style="margin-bottom:0.5em;">Hi, I'm <strong>Selene</strong>.</p>
              <p>Type a message below or press <kbd>/</kbd> for commands.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ─────────────────────────────────────────────────────────
           INPUT AREA — Floating bottom bar
           CSS: .input-area-wrapper / .input-panel
           ───────────────────────────────────────────────────────── -->
      <div class="input-area-wrapper">

        <!-- Slash Command Menu — CSS: .slash-menu  |  JS: dom.slashMenu = #slash-menu -->
        <div id="slash-menu" class="slash-menu" role="listbox" aria-label="Slash commands">
          <!-- Populated dynamically by app.js §11 -->
        </div>

        <div class="input-panel">
          <textarea id="message-input"
                    rows="1"
                    placeholder="Type / for commands..."
                    aria-label="Message input"
                    autocomplete="off"
                    spellcheck="true"></textarea>
          <button id="send-btn" class="send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       SETTINGS DRAWER — Slides in from right
       CSS: .scrim / .settings-drawer / .open
       JS: dom.settingsScrim = #scrim  |  dom.settingsDrawer = #settings-drawer
       ═══════════════════════════════════════════════════════════════ -->

  <!-- Dark Scrim -->
  <div id="scrim" class="scrim" aria-hidden="true"></div>

  <!-- Settings Panel -->
  <aside id="settings-drawer" class="settings-drawer" role="complementary"
         aria-label="Settings" aria-hidden="true">

    <!-- Drawer Header — CSS: .drawer-header  |  JS: dom.closeDrawerBtn = #close-drawer -->
    <div class="drawer-header">
      <h2>Settings</h2>
      <button id="close-drawer" class="icon-btn" aria-label="Close settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Drawer Content — CSS: .drawer-content -->
    <div class="drawer-content">

      <!-- ── Model Parameters ──────────────────────────────────── -->
      <div class="settings-section">
        <h3>Model Parameters</h3>

        <!-- Temperature (0–2) -->
        <div class="setting-item">
          <div class="setting-label">
            <span>Temperature</span>
            <span id="temp-val" class="setting-value">0.7</span>
          </div>
          <div class="slider-track-wrap">
            <input id="temp-slider" type="range" min="0" max="2" step="0.05" value="0.7"
                   aria-label="Temperature">
          </div>
        </div>

        <!-- Top-P (0–1) -->
        <div class="setting-item">
          <div class="setting-label">
            <span>Top-P</span>
            <span id="topp-val" class="setting-value">1.0</span>
          </div>
          <div class="slider-track-wrap">
            <input id="topp-slider" type="range" min="0" max="1" step="0.05" value="1.0"
                   aria-label="Top-P">
          </div>
        </div>

        <!-- Max Context Tokens -->
        <div class="setting-item">
          <div class="setting-label">
            <span>Max Context</span>
            <span id="ctx-val" class="setting-value">8192</span>
          </div>
          <div class="slider-track-wrap">
            <input id="ctx-slider" type="range" min="1024" max="131072" step="1024" value="8192"
                   aria-label="Max context tokens">
          </div>
          <div class="setting-hint">num_ctx</div>
        </div>
      </div>

      <!-- ── System Prompt ─────────────────────────────────────── -->
      <div class="settings-section">
        <h3>System Prompt</h3>
        <textarea class="system-prompt-input"
                  rows="5"
                  placeholder="Enter system prompt…"
                  aria-label="System prompt">You are Selene, a helpful and precise AI assistant.</textarea>
      </div>

      <!-- ── Toggles / Behaviors ───────────────────────────────── -->
      <div class="settings-section">
        <h3>Behaviors</h3>

        <!-- Show Thinking Panel -->
        <label class="toggle-setting">
          <span>Show thinking panel</span>
          <div class="switch">
            <input type="checkbox" checked>
            <span class="slider round"></span>
          </div>
        </label>

        <!-- Stream Tokens -->
        <label class="toggle-setting">
          <span>Stream tokens</span>
          <div class="switch">
            <input type="checkbox" checked>
            <span class="slider round"></span>
          </div>
        </label>

        <!-- Verbose Mode -->
        <label class="toggle-setting">
          <span>Verbose mode</span>
          <div class="switch">
            <input type="checkbox">
            <span class="slider round"></span>
          </div>
        </label>
      </div>

      <!-- ── Session Controls ──────────────────────────────────── -->
      <div class="settings-section">
        <h3>Session</h3>
        <div class="btn-group">
          <button class="secondary-btn" aria-label="Save session">Save</button>
          <button class="secondary-btn" aria-label="Load session">Load</button>
          <button class="secondary-btn" aria-label="Export conversation">Export</button>
        </div>
      </div>

    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════════════════
       HTML TEMPLATES — Cloned by app.js for dynamic message rendering
       These are never rendered directly; used via .content.cloneNode()
       ═══════════════════════════════════════════════════════════════ -->

  <!-- Template: User Message Bubble -->
  <template id="tpl-user-msg">
    <div class="message user-msg">
      <div class="msg-content"></div>
    </div>
  </template>

  <!-- Template: Assistant Message Bubble (with thinking panel) -->
  <template id="tpl-assistant-msg">
    <div class="message assistant-msg">
      <!-- Thinking Panel (hidden by default, shown when thinking content arrives) -->
      <div class="thinking-panel collapsed" style="display:none;">
        <button class="thinking-toggle" aria-label="Toggle thinking panel" aria-expanded="false">
          <span class="chevron" aria-hidden="true">▸</span>
          <span>Thinking…</span>
        </button>
        <div class="thinking-content"></div>
      </div>
      <!-- Message Content (markdown rendered here) -->
      <div class="msg-content markdown-body"></div>
    </div>
  </template>

  <!-- Template: Tool Invocation Card -->
  <template id="tpl-tool-card">
    <div class="tool-card running">
      <div class="tool-header">
        <span class="tool-status-icon">⚡</span>
        <span class="tool-name"></span>
        <span class="tool-status" style="margin-left:auto;font-size:0.82rem;color:var(--text-muted)">Running…</span>
      </div>
      <div class="tool-details">
        <div class="tool-input"></div>
        <div class="tool-output"></div>
      </div>
    </div>
  </template>

  <!-- ═══════════════════════════════════════════════════════════════
       APPLICATION SCRIPT
       ═══════════════════════════════════════════════════════════════ -->
  <script src="app.js"></script>

</body>
</html>
